# ============================================================================
# Kopag POS Dashboard — GraphQL Schema (FE proposal → BE)
# Version: 0.1.0 (2026-04-17)
# ----------------------------------------------------------------------------
# Scope: auth, menu/products, tables, orders, bills, history, profile
# (analytics, report, transactions, account settings).
# ============================================================================

# ---------- Scalars -------------------------------------------------------
scalar DateTime       # ISO-8601, UTC, e.g. "2026-04-17T10:20:00Z"
scalar Date           # ISO-8601 calendar date, e.g. "2026-04-17"
scalar Decimal        # String-encoded fixed-point, e.g. "157.00" (money)
scalar JSON           # Arbitrary JSON payload for ad-hoc metadata
scalar Upload         # multipart/form-data file upload (graphql-upload)

# ---------- Global enums --------------------------------------------------
enum SortDirection { ASC DESC }

# ---------- Pagination (Relay-style cursor) -------------------------------
"""
Relay connection arguments. Use `first`/`after` for forward pagination,
`last`/`before` for backward. Server enforces `first <= 100`.
"""
input ConnectionArgs {
  first: Int
  after: String
  last: Int
  before: String
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ---------- Common result / error shapes ----------------------------------
interface Node { id: ID! }

"""
Standard error payload returned inside union result types.
`code` is a stable machine-readable key (e.g. UNAUTHENTICATED, NOT_FOUND,
VALIDATION_FAILED, CONFLICT, RATE_LIMITED).
"""
type UserError {
  code: String!
  field: String
  message: String!
}

type OperationResult {
  success: Boolean!
  errors: [UserError!]!
}

# ============================================================================
# AUTH
# ============================================================================

type Viewer {
  id: ID!
  email: String!
  name: String!
  role: UserRole!
  avatarUrl: String
  restaurant: Restaurant
}

enum UserRole { OWNER MANAGER CASHIER WAITER }

type Restaurant {
  id: ID!
  name: String!
  address: String
  phone: String
  timezone: String!
}

type AuthSession {
  accessToken: String!      # short-lived JWT (~15m)
  refreshToken: String!     # rotated on every refresh (~30d)
  expiresAt: DateTime!
  viewer: Viewer!
}

union LoginResult = AuthSession | AuthError
type AuthError { code: String! message: String! }

input LoginInput {
  email: String!
  password: String!
  rememberMe: Boolean = false
}

input RegisterInput {
  name: String!
  email: String!
  password: String!
  restaurantName: String!
  phone: String
}

input ForgotPasswordInput { email: String! }
input VerifyOtpInput { email: String! otp: String! }
input ResetPasswordInput {
  resetToken: String!       # issued after OTP verification
  newPassword: String!
}

# ============================================================================
# MENU / PRODUCTS
# ============================================================================

type MenuCategory implements Node {
  id: ID!
  name: String!
  sortOrder: Int!
}

type MenuItem implements Node {
  id: ID!
  category: MenuCategory!
  name: String!
  description: String!
  price: Decimal!
  imageUrl: String
  emoji: String
  imageGradient: String     # fallback gradient for FE when imageUrl is null
  stock: MenuStock!
  isAvailable: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type MenuStock {
  available: Int!
  sold: Int!
  reorderThreshold: Int
}

type MenuItemConnection {
  edges: [MenuItemEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}
type MenuItemEdge { cursor: String! node: MenuItem! }

input MenuItemFilter {
  search: String
  categoryIds: [ID!]
  availableOnly: Boolean
}

enum MenuItemSortField { NAME PRICE CREATED_AT SOLD }
input MenuItemSort { field: MenuItemSortField! = CREATED_AT direction: SortDirection! = DESC }

input CreateMenuItemInput {
  categoryId: ID!
  name: String!
  description: String
  price: Decimal!
  image: Upload
  emoji: String
  initialStock: Int!
}

input UpdateMenuItemInput {
  id: ID!
  categoryId: ID
  name: String
  description: String
  price: Decimal
  image: Upload
  emoji: String
}

# ============================================================================
# TABLES
# ============================================================================

enum TableStatus { AVAILABLE OCCUPIED RESERVED }
enum TableSize { SMALL LARGE }

type DiningTable implements Node {
  id: ID!
  name: String!
  seats: Int!
  size: TableSize!
  zone: String!
  status: TableStatus!
  currentOrder: Order
}

input TableFilter {
  zones: [String!]
  statuses: [TableStatus!]
}

input UpdateTableStatusInput {
  tableId: ID!
  status: TableStatus!
}

# ============================================================================
# ORDERS
# ============================================================================

enum OrderStatus { PENDING PREPARING READY SERVED COMPLETED CANCELLED }
enum ServiceMode { DINE_IN TAKE_AWAY }

type Customer implements Node {
  id: ID!
  name: String!
  phone: String
}

type OrderLine {
  menuItem: MenuItem!
  name: String!             # denormalized snapshot
  unitPrice: Decimal!
  quantity: Int!
  note: String
  lineTotal: Decimal!
}

type Order implements Node {
  id: ID!
  code: String!             # short human code, e.g. "1234"
  customer: Customer
  customerName: String!
  table: DiningTable
  mode: ServiceMode!
  status: OrderStatus!
  items: [OrderLine!]!
  subtotal: Decimal!
  tax: Decimal!
  total: Decimal!
  createdAt: DateTime!
  updatedAt: DateTime!
  bill: Bill                # null until checked out
}

type OrderConnection {
  edges: [OrderEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}
type OrderEdge { cursor: String! node: Order! }

input OrderFilter {
  search: String            # matches code, customer name, table name
  statuses: [OrderStatus!]
  modes: [ServiceMode!]
  tableIds: [ID!]
  dateFrom: DateTime
  dateTo: DateTime
}

enum OrderSortField { CREATED_AT TOTAL CODE }
input OrderSort { field: OrderSortField! = CREATED_AT direction: SortDirection! = DESC }

input CreateOrderInput {
  customerId: ID
  customerName: String!
  tableId: ID
  mode: ServiceMode!
  items: [OrderLineInput!]!
}

input OrderLineInput {
  menuItemId: ID!
  quantity: Int!
  note: String
}

input UpdateOrderStatusInput {
  orderId: ID!
  status: OrderStatus!
}

input AddOrderItemsInput {
  orderId: ID!
  items: [OrderLineInput!]!
}

input UpdateOrderLineInput {
  orderId: ID!
  menuItemId: ID!
  quantity: Int             # null → remove
  note: String
}

"""
Move an order from one table to another (khách đổi chỗ). If destination table
already has an open order, the BE must reject with CONFLICT.
"""
input MoveOrderInput {
  orderId: ID!
  destinationTableId: ID!
  reason: String
}

"""
Merge multiple orders (typically on adjacent tables when a group arrives bigger
than expected) into a single order that lives on `primaryTableId`. Merged
orders are voided with reason "merged into <primary>".
"""
input MergeOrdersInput {
  primaryOrderId: ID!
  mergeOrderIds: [ID!]!
  attachTableIds: [ID!]     # optional extra tables to reserve under primary
}

# ============================================================================
# BILLS (CHECKOUT / PAYMENT)
# ============================================================================

enum PaymentMethod { CASH CARD QR EWALLET }

type Bill implements Node {
  id: ID!
  code: String!             # e.g. "B-20260417-0042"
  order: Order!
  customerName: String!
  tableName: String
  tableCode: String
  items: [OrderLine!]!
  subtotal: Decimal!
  tax: Decimal!
  total: Decimal!
  paymentMethod: PaymentMethod!
  paidAt: DateTime!
  cashReceived: Decimal
  changeDue: Decimal
  receiptUrl: String        # pre-signed PDF URL
}

type BillConnection {
  edges: [BillEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}
type BillEdge { cursor: String! node: Bill! }

input BillFilter {
  search: String            # matches code, payment method, customer
  paymentMethods: [PaymentMethod!]
  dateFrom: DateTime
  dateTo: DateTime
}

enum BillSortField { PAID_AT TOTAL }
input BillSort { field: BillSortField! = PAID_AT direction: SortDirection! = DESC }

input CheckoutOrderInput {
  orderId: ID!
  paymentMethod: PaymentMethod!
  cashReceived: Decimal
  tip: Decimal
  discount: Decimal
  discountReason: String
}

"""
Split 1 order into multiple sub-bills that are checked out independently.
Strategy = EVEN → divide total equally across `portions` people.
Strategy = BY_ITEM → assign each line item to a bucket via `itemBuckets`.
Each resulting SplitBill gets its own paymentMethod at checkout time.
"""
enum SplitStrategy { EVEN BY_ITEM }

input SplitOrderInput {
  orderId: ID!
  strategy: SplitStrategy!
  portions: Int             # required when EVEN
  itemBuckets: [ItemBucketInput!]  # required when BY_ITEM
  tipDistribution: TipDistribution = PROPORTIONAL
}

enum TipDistribution { PROPORTIONAL EQUAL ON_PRIMARY }

input ItemBucketInput {
  bucketIndex: Int!
  lineIds: [ID!]!           # OrderLine IDs assigned to this bucket
}

type SplitBill implements Node {
  id: ID!
  bucketIndex: Int!
  sourceOrder: Order!
  items: [OrderLine!]!
  subtotal: Decimal!
  tax: Decimal!
  tip: Decimal!
  total: Decimal!
  status: SplitBillStatus!
  paidBill: Bill            # set when this sub-bill is checked out
}
enum SplitBillStatus { PENDING PAID VOIDED }

input CheckoutSplitBillInput {
  splitBillId: ID!
  paymentMethod: PaymentMethod!
  cashReceived: Decimal
}

# ============================================================================
# HISTORY (order + bill unified timeline)
# ============================================================================

enum HistoryKind { ORDER BILL }

type HistoryEntry {
  id: ID!
  kind: HistoryKind!
  occurredAt: DateTime!
  order: Order
  bill: Bill
}

input HistoryFilter {
  search: String
  kinds: [HistoryKind!]
  dateFrom: DateTime
  dateTo: DateTime
}

# ============================================================================
# PROFILE — ANALYTICS (dashboard + profile/analytics tab)
# ============================================================================

enum DateRangePreset { TODAY YESTERDAY LAST_7_DAYS LAST_30_DAYS MONTH_TO_DATE LAST_6_MONTHS LAST_YEAR CUSTOM }

input DateRangeInput {
  preset: DateRangePreset = LAST_30_DAYS
  from: Date                # required if preset = CUSTOM
  to: Date
}

type AnalyticsStat {
  label: String!
  value: Decimal!
  previousValue: Decimal!
  deltaPercent: Float!      # (value - previousValue) / previousValue
  trend: StatTrend!
}
enum StatTrend { UP DOWN FLAT }

type AnalyticsOverview {
  totalSales: AnalyticsStat!
  totalOrders: AnalyticsStat!
  totalRevenue: AnalyticsStat!
  cancelledOrders: AnalyticsStat!
}

type SalesSeriesPoint { label: String! date: Date! value: Decimal! }
type SalesSeries {
  points: [SalesSeriesPoint!]!
  highlightedIndex: Int     # BE's suggested "peak" marker
}

type IncomeSegment { name: String! value: Decimal! color: String! }
type IncomeBreakdown {
  total: Decimal!
  segments: [IncomeSegment!]!
}

type TrendingMenuItem {
  item: MenuItem!
  orderCount: Int!
  deltaPercent: Float!
}

# ============================================================================
# PROFILE — TRANSACTIONS (inventory/stock movement — the Transaction tab)
# ============================================================================

enum TransactionType { STOCK_IN STOCK_OUT ADJUSTMENT WASTE }

type InventoryTransaction implements Node {
  id: ID!
  product: MenuItem!        # or a dedicated RawProduct entity — see note below
  productName: String!
  type: TransactionType!
  quantityUsed: Int!        # numerator of "Quality" column
  quantityTotal: Int!       # denominator
  unit: String!             # e.g. "kg"
  unitPrice: Decimal!
  totalPrice: Decimal!
  occurredAt: DateTime!
  createdBy: Viewer!
  note: String
}

type InventoryTransactionConnection {
  edges: [InventoryTransactionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}
type InventoryTransactionEdge { cursor: String! node: InventoryTransaction! }

input InventoryTransactionFilter {
  search: String
  types: [TransactionType!]
  dateFrom: DateTime
  dateTo: DateTime
}

enum InventoryTransactionSortField { OCCURRED_AT PRICE QUANTITY }
input InventoryTransactionSort {
  field: InventoryTransactionSortField! = OCCURRED_AT
  direction: SortDirection! = DESC
}

input CreateInventoryTransactionInput {
  productId: ID!
  type: TransactionType!
  quantityUsed: Int!
  quantityTotal: Int!
  unit: String!
  unitPrice: Decimal!
  occurredAt: DateTime
  note: String
}

input UpdateInventoryTransactionInput {
  id: ID!
  type: TransactionType
  quantityUsed: Int
  quantityTotal: Int
  unitPrice: Decimal
  note: String
}

# ============================================================================
# PROFILE — REPORT (report tab: payment-method breakdown)
# ============================================================================

enum ReportGranularity { DAILY WEEKLY MONTHLY }

type ReportRow {
  id: ID!
  periodStart: DateTime!
  paymentMethod: PaymentMethod!
  totalCollected: Decimal!
  transactionCount: Int!
}

type ReportConnection {
  edges: [ReportRowEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}
type ReportRowEdge { cursor: String! node: ReportRow! }

input ReportFilter {
  search: String
  granularity: ReportGranularity! = DAILY
  dateRange: DateRangeInput
  paymentMethods: [PaymentMethod!]
}

# ============================================================================
# PROFILE — ACCOUNT SETTINGS
# ============================================================================

input UpdateProfileInput {
  name: String
  email: String
  phone: String
  address: String
  avatar: Upload
}

input UpdatePasswordInput {
  currentPassword: String!
  newPassword: String!
}

# ============================================================================
# EXPORTS (Download buttons — Report + Transactions)
# ============================================================================

enum ExportFormat { CSV PDF XLSX }
enum ExportKind { REPORT TRANSACTIONS BILLS ORDERS }

type ExportJob {
  id: ID!
  kind: ExportKind!
  format: ExportFormat!
  status: ExportJobStatus!
  downloadUrl: String       # populated when status = READY
  expiresAt: DateTime
  createdAt: DateTime!
}
enum ExportJobStatus { PENDING PROCESSING READY FAILED }

input RequestExportInput {
  kind: ExportKind!
  format: ExportFormat! = CSV
  dateRange: DateRangeInput
  filter: JSON              # pass-through of the corresponding *Filter type
}

# ============================================================================
# NOTIFICATIONS (header bell + messages circle)
# ============================================================================

enum NotificationLevel { INFO SUCCESS WARNING ERROR }

type Notification implements Node {
  id: ID!
  level: NotificationLevel!
  title: String!
  body: String
  readAt: DateTime
  createdAt: DateTime!
  link: String
}

type NotificationConnection {
  edges: [NotificationEdge!]!
  pageInfo: PageInfo!
  unreadCount: Int!
}
type NotificationEdge { cursor: String! node: Notification! }

# ============================================================================
# KITCHEN DISPLAY SYSTEM (KDS)
# ============================================================================

enum Station { GRILL COLD BAR DESSERT EXPO CUSTOM }
enum TicketStatus { PENDING PREPARING READY SERVED VOIDED }

"""
A KitchenTicket is a per-station slice of an Order. An order with items from
both Grill and Bar produces 2 tickets (one per station) that are bumped
independently. Parent Order moves to READY only when all its tickets are READY.
"""
type KitchenTicket implements Node {
  id: ID!
  parentOrder: Order!
  station: Station!
  stationLabel: String!     # cho phép station custom name
  status: TicketStatus!
  items: [KitchenTicketItem!]!
  orderNote: String         # ghi chú đơn, denormalized
  waiterName: String!
  createdAt: DateTime!
  startedAt: DateTime
  bumpedAt: DateTime
  bumpedBy: Viewer
  elapsedSeconds: Int!      # computed server-side: (now - createdAt)
  isEscalated: Boolean!     # true nếu quá threshold
}

type KitchenTicketItem {
  id: ID!
  menuItem: MenuItem!
  name: String!             # snapshot
  quantity: Int!
  modifiers: [String!]!
  note: String
  urgent: Boolean!          # allergy, dietary restriction flagging
  prepDone: Boolean!
  voided: Boolean!
}

type AllDayRow {
  menuItem: MenuItem!
  made: Int!                # bumped trong ngày
  preparing: Int!           # đang nấu ở các station
  remaining: Int!           # stock còn (từ MenuStock.available)
  isUnavailable: Boolean!
}

input KitchenTicketFilter {
  stations: [Station!]
  statuses: [TicketStatus!]
  escalatedOnly: Boolean
}

input MarkMenuItemUnavailableInput {
  menuItemId: ID!
  until: UnavailableDuration!
  reason: String
}

enum UnavailableDuration { FIFTEEN_MIN END_OF_SHIFT END_OF_DAY INDEFINITE }

# ============================================================================
# WAITLIST (HOST / HÀNG ĐỢI LỄ TÂN)
# ============================================================================

enum WaitlistStatus { WAITING NOTIFIED SEATED CANCELLED NO_SHOW }

type WaitlistEntry implements Node {
  id: ID!
  code: String!                     # vd "Q-042"
  customerName: String!
  phone: String!
  partySize: Int!
  preferredZone: String             # "A" | "B" | "C" | "any"
  note: String
  status: WaitlistStatus!
  estimatedMinutes: Int!
  createdAt: DateTime!
  notifiedAt: DateTime
  seatedAt: DateTime
  seatedTable: DiningTable
  smsCount: Int!
}

input WaitlistFilter {
  search: String
  statuses: [WaitlistStatus!]
}

input CreateWaitlistEntryInput {
  customerName: String!
  phone: String!
  partySize: Int!
  preferredZone: String
  note: String
}

input SeatWaitlistEntryInput {
  entryId: ID!
  tableId: ID!
}

# ============================================================================
# VOUCHER / PROMOTION
# ============================================================================

enum VoucherType { PERCENT FIXED FREE_ITEM }
enum VoucherScope { ALL FOOD DRINK }

type Voucher implements Node {
  id: ID!
  code: String!                     # unique, human-friendly
  label: String!
  type: VoucherType!
  value: Decimal!
  minSpend: Decimal
  appliesTo: VoucherScope!
  startsAt: DateTime
  expiresAt: DateTime
  usageLimit: Int                   # null = unlimited
  usedCount: Int!
  isActive: Boolean!
}

type VoucherApplication {
  voucher: Voucher!
  discountAmount: Decimal!          # computed against subtotal + scope
  valid: Boolean!
  errorCode: String                 # EXPIRED, MIN_SPEND, USAGE_EXCEEDED...
  errorMessage: String
}

input ApplyVoucherInput {
  orderId: ID!
  code: String!
}

# ============================================================================
# CUSTOMER / LOYALTY
# ============================================================================

enum LoyaltyTier { NEW SILVER GOLD PLATINUM }

type LoyaltyCustomer implements Node {
  id: ID!
  name: String!
  phone: String!
  email: String
  tier: LoyaltyTier!
  points: Int!
  visits: Int!
  totalSpent: Decimal!
  lastVisitAt: DateTime
  birthday: Date
  createdAt: DateTime!
}

input LoyaltyLookupInput {
  phone: String
  query: String                     # partial name or phone
}

input CreateLoyaltyCustomerInput {
  name: String!
  phone: String!
  email: String
  birthday: Date
}

input AttachCustomerToOrderInput {
  orderId: ID!
  customerId: ID!
}

"""
Redeem reward points (deduct from balance, apply as order discount). 1 point
usually worth a fixed fraction (e.g. 1pt = $0.01). BE enforces tier rules.
"""
input RedeemPointsInput {
  orderId: ID!
  customerId: ID!
  points: Int!
}

# ============================================================================
# BOOKING (RESERVATION)
# ============================================================================

enum BookingStatus { PENDING CONFIRMED ARRIVED CANCELLED NO_SHOW }
enum BookingSource { PHONE WALKIN APP WEB PARTNER }

type Booking implements Node {
  id: ID!
  code: String!                     # "BK-1042"
  customer: LoyaltyCustomer         # null if walk-in unregistered
  customerName: String!
  phone: String!
  email: String
  partySize: Int!
  date: Date!
  time: String!                     # "19:30" HH:mm
  duration: Int!                    # phút
  table: DiningTable                # resolved when confirmed
  tables: [DiningTable!]!           # nhiều bàn nếu ghép
  status: BookingStatus!
  source: BookingSource!
  deposit: Decimal
  depositPaid: Boolean!
  specialRequests: String
  remindersSent: Int!
  createdAt: DateTime!
  arrivedAt: DateTime
  cancelledAt: DateTime
}

input BookingFilter {
  search: String
  statuses: [BookingStatus!]
  dateFrom: Date
  dateTo: Date
}

input CreateBookingInput {
  customerName: String!
  phone: String!
  email: String
  partySize: Int!
  date: Date!
  time: String!
  duration: Int = 90
  source: BookingSource = PHONE
  deposit: Decimal
  specialRequests: String
  tableIds: [ID!]
}

input UpdateBookingInput {
  id: ID!
  partySize: Int
  date: Date
  time: String
  duration: Int
  tableIds: [ID!]
  specialRequests: String
}

# ============================================================================
# GUEST SELF-ORDER (CUSTOMER-FACING QR APP)
# ============================================================================

"""
Session tied to a QR code sticker on the table. Guests scan → GET /guest/{code}
resolves to `GuestSession` on BE. No auth required; rate-limited by IP + table.
"""
type GuestSession {
  id: ID!
  table: DiningTable!
  order: Order                      # null until first item added
  expiresAt: DateTime!
}

input StartGuestSessionInput {
  tableQrCode: String!              # payload inside QR sticker
}

input GuestAddItemsInput {
  sessionId: ID!
  items: [OrderLineInput!]!
}

input GuestCheckoutInput {
  sessionId: ID!
  mode: GuestPaymentMode!
  contactChannel: ReceiptChannel
  contactValue: String              # email/phone to receive receipt
}

enum GuestPaymentMode {
  QR                                # khách trả ngay qua VietQR
  COUNTER                           # gửi qua cashier tính tiền tại quầy
}

input CallStaffInput {
  sessionId: ID!
  reason: CallReason!
  note: String
}

enum CallReason { ASSISTANCE WATER REFILL UTENSILS ELSE }

# ============================================================================
# REVIEWS / FEEDBACK
# ============================================================================

type Review implements Node {
  id: ID!
  order: Order
  booking: Booking
  guestSession: GuestSession
  customer: LoyaltyCustomer
  rating: Int!                      # 1-5
  comment: String
  tags: [String!]!                  # "slow", "friendly", "price"...
  createdAt: DateTime!
  staffReply: String
  staffRepliedAt: DateTime
  staffRepliedBy: Viewer
}

input CreateReviewInput {
  orderId: ID
  bookingId: ID
  sessionId: ID
  rating: Int!
  comment: String
  tags: [String!]
}

input ReviewFilter {
  minRating: Int
  maxRating: Int
  hasReply: Boolean
  dateFrom: DateTime
  dateTo: DateTime
}

# ============================================================================
# INVENTORY — INGREDIENTS & RECIPES (BOM)
# ============================================================================

type Ingredient implements Node {
  id: ID!
  name: String!
  emoji: String
  unit: String!                     # "g" | "ml" | "pcs" | "kg" | "l"
  stock: Decimal!
  reorderPoint: Decimal!
  costPerUnit: Decimal!
  supplier: String
  supplierRef: Supplier             # resolved supplier entity if linked
  lastRestockedAt: DateTime
  isActive: Boolean!
}

type Supplier implements Node {
  id: ID!
  name: String!
  phone: String
  email: String
  address: String
  leadTimeDays: Int!
}

type Recipe implements Node {
  id: ID!
  menuItem: MenuItem!
  lines: [RecipeLine!]!
  laborMinutes: Int!
  yields: Int!                      # portions per batch
  totalCost: Decimal!               # computed from ingredients
  grossMargin: Float!               # (price - cost) / price
}

type RecipeLine {
  ingredient: Ingredient!
  quantity: Decimal!
  waste: Decimal!                   # expected waste factor (0-1)
}

input CreateIngredientInput {
  name: String!
  unit: String!
  stock: Decimal!
  reorderPoint: Decimal!
  costPerUnit: Decimal!
  supplierId: ID
  emoji: String
}

input AdjustIngredientStockInput {
  ingredientId: ID!
  delta: Decimal!
  reason: StockAdjustReason!
  note: String
}

enum StockAdjustReason { RESTOCK WASTE USAGE CORRECTION RETURN }

input SaveRecipeInput {
  menuItemId: ID!
  lines: [RecipeLineInput!]!
  laborMinutes: Int!
  yields: Int!
}

input RecipeLineInput {
  ingredientId: ID!
  quantity: Decimal!
  waste: Decimal = 0
}

type StockMovement implements Node {
  id: ID!
  ingredient: Ingredient!
  delta: Decimal!                   # negative = consumed
  reason: StockAdjustReason!
  note: String
  orderId: ID                       # if auto-deducted from order
  createdBy: Viewer
  createdAt: DateTime!
}

input StockMovementFilter {
  ingredientIds: [ID!]
  reasons: [StockAdjustReason!]
  dateFrom: DateTime
  dateTo: DateTime
}

# ============================================================================
# HR — STAFF, SHIFTS, TIMESHEETS
# ============================================================================

enum StaffStatus { ACTIVE LEAVE INACTIVE }
enum ShiftStatus { SCHEDULED CLOCKED_IN COMPLETED ABSENT }

type Staff implements Node {
  id: ID!
  name: String!
  initials: String!
  phone: String!
  email: String!
  role: UserRole!
  status: StaffStatus!
  pinMasked: String!                # last 2 digits only "****42"
  joinedAt: Date!
  hourlyRate: Decimal!
  thisWeekHours: Float!
  thisMonthHours: Float!
  thisMonthRevenue: Decimal         # if tracked (for cashier/waiter)
  avatarColor: String               # gradient token
}

type Shift implements Node {
  id: ID!
  staff: Staff!
  date: Date!
  startTime: String!                # "HH:mm"
  endTime: String!
  role: UserRole!
  status: ShiftStatus!
  clockedInAt: DateTime
  clockedOutAt: DateTime
  note: String
}

type TimesheetEntry implements Node {
  id: ID!
  staff: Staff!
  shift: Shift
  clockedInAt: DateTime!
  clockedOutAt: DateTime
  hours: Float!                     # computed when clocked out
  earning: Decimal!                 # hours * hourlyRate
}

type PayrollSummary {
  staff: Staff!
  periodFrom: Date!
  periodTo: Date!
  hoursWorked: Float!
  hourlyRate: Decimal!
  basePay: Decimal!
  tips: Decimal!
  bonuses: Decimal!
  deductions: Decimal!
  total: Decimal!
}

input StaffFilter {
  search: String
  roles: [UserRole!]
  statuses: [StaffStatus!]
}

input CreateStaffInput {
  name: String!
  phone: String!
  email: String!
  role: UserRole!
  pin: String!
  hourlyRate: Decimal!
  joinedAt: Date
}

input UpdateStaffInput {
  id: ID!
  name: String
  phone: String
  email: String
  role: UserRole
  hourlyRate: Decimal
  status: StaffStatus
}

input CreateShiftInput {
  staffId: ID!
  date: Date!
  startTime: String!
  endTime: String!
  note: String
}

input UpdateShiftInput {
  id: ID!
  startTime: String
  endTime: String
  status: ShiftStatus
}

input ClockInput {
  shiftId: ID!                      # optional; BE can infer from staff + today
  pin: String!                      # re-confirm identity
}

input ShiftFilter {
  staffIds: [ID!]
  dateFrom: Date
  dateTo: Date
  statuses: [ShiftStatus!]
}

# ============================================================================
# ROOT — Query
# ============================================================================

type Query {
  # --- Auth / viewer ------------------------------------------------------
  viewer: Viewer

  # --- Menu / products ----------------------------------------------------
  menuCategories: [MenuCategory!]!
  menuItems(
    page: ConnectionArgs
    filter: MenuItemFilter
    sort: MenuItemSort
  ): MenuItemConnection!
  menuItem(id: ID!): MenuItem

  # --- Tables -------------------------------------------------------------
  tables(filter: TableFilter): [DiningTable!]!
  table(id: ID!): DiningTable

  # --- Orders -------------------------------------------------------------
  orders(
    page: ConnectionArgs
    filter: OrderFilter
    sort: OrderSort
  ): OrderConnection!
  order(id: ID!): Order

  # --- Bills --------------------------------------------------------------
  bills(
    page: ConnectionArgs
    filter: BillFilter
    sort: BillSort
  ): BillConnection!
  bill(id: ID!): Bill

  # --- History (unified) --------------------------------------------------
  history(
    page: ConnectionArgs
    filter: HistoryFilter
  ): [HistoryEntry!]!

  # --- Profile: analytics -------------------------------------------------
  analyticsOverview(dateRange: DateRangeInput): AnalyticsOverview!
  salesSeries(dateRange: DateRangeInput): SalesSeries!
  incomeBreakdown(dateRange: DateRangeInput): IncomeBreakdown!
  trendingMenu(dateRange: DateRangeInput, limit: Int = 5): [TrendingMenuItem!]!
  recentTransactions(limit: Int = 3): [InventoryTransaction!]!

  # --- Profile: transactions (full list) ---------------------------------
  inventoryTransactions(
    page: ConnectionArgs
    filter: InventoryTransactionFilter
    sort: InventoryTransactionSort
  ): InventoryTransactionConnection!
  inventoryTransaction(id: ID!): InventoryTransaction

  # --- Profile: report ----------------------------------------------------
  report(
    page: ConnectionArgs
    filter: ReportFilter!
  ): ReportConnection!

  # --- Notifications ------------------------------------------------------
  notifications(page: ConnectionArgs, unreadOnly: Boolean = false): NotificationConnection!

  # --- Exports ------------------------------------------------------------
  exportJob(id: ID!): ExportJob

  # --- KDS ----------------------------------------------------------------
  kitchenTickets(filter: KitchenTicketFilter): [KitchenTicket!]!
  kitchenTicket(id: ID!): KitchenTicket
  allDaySummary(station: Station, date: Date): [AllDayRow!]!

  # --- Split bills --------------------------------------------------------
  splitBills(orderId: ID!): [SplitBill!]!

  # --- Waitlist -----------------------------------------------------------
  waitlistEntries(filter: WaitlistFilter): [WaitlistEntry!]!
  waitlistEntry(id: ID!): WaitlistEntry

  # --- Voucher / Loyalty --------------------------------------------------
  vouchers(activeOnly: Boolean = true): [Voucher!]!
  voucher(code: String!): Voucher
  validateVoucher(orderId: ID!, code: String!): VoucherApplication!
  loyaltyCustomers(input: LoyaltyLookupInput!): [LoyaltyCustomer!]!
  loyaltyCustomer(id: ID!): LoyaltyCustomer

  # --- Bookings -----------------------------------------------------------
  bookings(filter: BookingFilter): [Booking!]!
  booking(id: ID!): Booking

  # --- Guest self-order (public, rate-limited) ---------------------------
  guestSession(id: ID!): GuestSession

  # --- Reviews ------------------------------------------------------------
  reviews(page: ConnectionArgs, filter: ReviewFilter): [Review!]!
  review(id: ID!): Review

  # --- Inventory / Recipes ------------------------------------------------
  ingredients(activeOnly: Boolean = true): [Ingredient!]!
  ingredient(id: ID!): Ingredient
  suppliers: [Supplier!]!
  recipes: [Recipe!]!
  recipe(menuItemId: ID!): Recipe
  stockMovements(filter: StockMovementFilter, page: ConnectionArgs): [StockMovement!]!

  # --- HR -----------------------------------------------------------------
  staff(filter: StaffFilter): [Staff!]!
  staffMember(id: ID!): Staff
  shifts(filter: ShiftFilter): [Shift!]!
  shift(id: ID!): Shift
  timesheet(staffId: ID!, dateFrom: Date!, dateTo: Date!): [TimesheetEntry!]!
  payroll(staffId: ID!, from: Date!, to: Date!): PayrollSummary!
}

# ============================================================================
# ROOT — Mutation
# ============================================================================

type Mutation {
  # --- Auth ---------------------------------------------------------------
  login(input: LoginInput!): LoginResult!
  register(input: RegisterInput!): LoginResult!
  refreshSession(refreshToken: String!): AuthSession!
  logout: OperationResult!

  forgotPassword(input: ForgotPasswordInput!): OperationResult!
  verifyOtp(input: VerifyOtpInput!): OperationResult!   # returns resetToken via userErrors-free path
  resetPassword(input: ResetPasswordInput!): OperationResult!

  # --- Menu / products ----------------------------------------------------
  createMenuItem(input: CreateMenuItemInput!): MenuItem!
  updateMenuItem(input: UpdateMenuItemInput!): MenuItem!
  deleteMenuItem(id: ID!): OperationResult!
  adjustMenuItemStock(id: ID!, delta: Int!): MenuItem!

  # --- Tables -------------------------------------------------------------
  updateTableStatus(input: UpdateTableStatusInput!): DiningTable!

  # --- Orders -------------------------------------------------------------
  createOrder(input: CreateOrderInput!): Order!
  updateOrderStatus(input: UpdateOrderStatusInput!): Order!
  addOrderItems(input: AddOrderItemsInput!): Order!
  updateOrderLine(input: UpdateOrderLineInput!): Order!
  cancelOrder(id: ID!, reason: String): Order!
  moveOrder(input: MoveOrderInput!): Order!
  mergeOrders(input: MergeOrdersInput!): Order!

  # --- Bills / checkout ---------------------------------------------------
  checkoutOrder(input: CheckoutOrderInput!): Bill!
  voidBill(id: ID!, reason: String!): OperationResult!

  # --- Split bill --------------------------------------------------------
  splitOrder(input: SplitOrderInput!): [SplitBill!]!
  checkoutSplitBill(input: CheckoutSplitBillInput!): Bill!
  voidSplit(orderId: ID!): OperationResult!      # gộp lại các SplitBill PENDING về order gốc

  # --- KDS ----------------------------------------------------------------
  startTicket(ticketId: ID!): KitchenTicket!
  bumpTicket(ticketId: ID!): KitchenTicket!
  recallTicket(ticketId: ID!): KitchenTicket!
  togglePrepDone(itemId: ID!, done: Boolean!): KitchenTicketItem!
  markMenuItemUnavailable(input: MarkMenuItemUnavailableInput!): MenuItem!
  restoreMenuItem(menuItemId: ID!): MenuItem!
  sendReceipt(billId: ID!, channel: ReceiptChannel!, recipient: String!): OperationResult!

  # --- Waitlist -----------------------------------------------------------
  createWaitlistEntry(input: CreateWaitlistEntryInput!): WaitlistEntry!
  notifyWaitlistEntry(id: ID!): WaitlistEntry!        # gửi SMS
  seatWaitlistEntry(input: SeatWaitlistEntryInput!): Order!  # create order + link entry
  cancelWaitlistEntry(id: ID!, reason: String): WaitlistEntry!
  markWaitlistNoShow(id: ID!): WaitlistEntry!

  # --- Voucher ------------------------------------------------------------
  applyVoucher(input: ApplyVoucherInput!): VoucherApplication!
  removeVoucher(orderId: ID!): OperationResult!

  # --- Loyalty ------------------------------------------------------------
  createLoyaltyCustomer(input: CreateLoyaltyCustomerInput!): LoyaltyCustomer!
  attachCustomerToOrder(input: AttachCustomerToOrderInput!): Order!
  detachCustomerFromOrder(orderId: ID!): Order!
  redeemPoints(input: RedeemPointsInput!): Order!

  # --- Bookings -----------------------------------------------------------
  createBooking(input: CreateBookingInput!): Booking!
  updateBooking(input: UpdateBookingInput!): Booking!
  confirmBooking(id: ID!): Booking!
  sendBookingReminder(id: ID!): Booking!
  markBookingArrived(id: ID!): Order!         # creates Order from booking
  cancelBooking(id: ID!, reason: String): Booking!
  markBookingNoShow(id: ID!): Booking!

  # --- Guest self-order (public) -----------------------------------------
  startGuestSession(input: StartGuestSessionInput!): GuestSession!
  guestAddItems(input: GuestAddItemsInput!): GuestSession!
  guestCheckout(input: GuestCheckoutInput!): Bill!
  callStaff(input: CallStaffInput!): OperationResult!

  # --- Reviews ------------------------------------------------------------
  createReview(input: CreateReviewInput!): Review!
  replyReview(id: ID!, reply: String!): Review!

  # --- Inventory / Recipes ------------------------------------------------
  createIngredient(input: CreateIngredientInput!): Ingredient!
  updateIngredient(id: ID!, input: CreateIngredientInput!): Ingredient!
  deactivateIngredient(id: ID!): OperationResult!
  adjustIngredientStock(input: AdjustIngredientStockInput!): Ingredient!
  saveRecipe(input: SaveRecipeInput!): Recipe!
  deleteRecipe(menuItemId: ID!): OperationResult!

  # --- HR -----------------------------------------------------------------
  createStaff(input: CreateStaffInput!): Staff!
  updateStaff(input: UpdateStaffInput!): Staff!
  resetStaffPin(id: ID!, newPin: String!): Staff!
  deactivateStaff(id: ID!): Staff!

  createShift(input: CreateShiftInput!): Shift!
  updateShift(input: UpdateShiftInput!): Shift!
  deleteShift(id: ID!): OperationResult!
  clockIn(input: ClockInput!): Shift!
  clockOut(input: ClockInput!): Shift!
  markShiftAbsent(id: ID!, reason: String): Shift!

  # --- Profile: transactions ---------------------------------------------
  createInventoryTransaction(input: CreateInventoryTransactionInput!): InventoryTransaction!
  updateInventoryTransaction(input: UpdateInventoryTransactionInput!): InventoryTransaction!
  deleteInventoryTransaction(id: ID!): OperationResult!

  # --- Profile: account settings -----------------------------------------
  updateProfile(input: UpdateProfileInput!): Viewer!
  updatePassword(input: UpdatePasswordInput!): OperationResult!

  # --- Notifications ------------------------------------------------------
  markNotificationRead(id: ID!): Notification!
  markAllNotificationsRead: OperationResult!

  # --- Exports ------------------------------------------------------------
  requestExport(input: RequestExportInput!): ExportJob!
}

# ============================================================================
# ROOT — Subscription (optional, recommended for real-time POS)
# ============================================================================

type Subscription {
  orderUpdated(statuses: [OrderStatus!]): Order!
  tableUpdated: DiningTable!
  notificationReceived: Notification!
  exportJobUpdated(id: ID!): ExportJob!

  # --- KDS realtime -------------------------------------------------------
  ticketCreated(station: Station): KitchenTicket!
  ticketUpdated(station: Station): KitchenTicket!
  ticketEscalated: KitchenTicket!                 # chỉ manager subscribe
  menuItemUnavailabilityChanged: MenuItem!

  # --- Waitlist realtime --------------------------------------------------
  waitlistEntryUpdated: WaitlistEntry!

  # --- Booking realtime ---------------------------------------------------
  bookingUpdated: Booking!

  # --- Guest session realtime (cho waiter biết khi khách thêm món) -------
  guestSessionUpdated(tableId: ID!): GuestSession!
  staffCalled: CallStaffEvent!

  # --- Inventory realtime -------------------------------------------------
  ingredientLowStock: Ingredient!                # fired khi cross reorderPoint
  stockMovementCreated: StockMovement!

  # --- HR realtime --------------------------------------------------------
  shiftUpdated: Shift!                            # clock in/out broadcast
}

type CallStaffEvent {
  id: ID!
  table: DiningTable!
  reason: CallReason!
  note: String
  calledAt: DateTime!
}

enum ReceiptChannel { PRINT EMAIL SMS EINVOICE }
